name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Django tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edify_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: edify_backend/requirements.txt
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Django system check
        run: python manage.py check
      - name: Run tests
        env:
          # Silence urllib3 LibreSSL noise; deterministic test hosts.
          PYTHONWARNINGS: 'ignore'
        run: python manage.py test accounts.tests lessons.tests edify_core.test_health -v 2

  frontend:
    name: Frontend typecheck + vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm test

  e2e:
    name: Playwright e2e smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: edify_backend/requirements.txt
      - name: Install Python deps
        working-directory: edify_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply migrations (fresh sqlite for CI)
        working-directory: edify_backend
        run: python manage.py migrate --noinput
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Align Django venv path for webServer command
        # playwright.config.ts spawns ./venv/bin/python from edify_backend;
        # in CI we use the system python, so symlink a venv dir at it.
        run: |
          mkdir -p edify_backend/venv/bin
          ln -sf "$(which python)" edify_backend/venv/bin/python
      - name: Run in-process Django tests (redundant safety net)
        working-directory: edify_backend
        run: ./venv/bin/python manage.py test accounts.tests lessons.tests edify_core.test_health -v 0
      - name: Run e2e tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
