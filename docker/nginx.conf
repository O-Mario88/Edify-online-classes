# nginx config for the frontend runtime container.
# Serves the built Vite assets and reverse-proxies API + admin + static + media
# to the backend (gunicorn) service on the compose network.

upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    # Larger uploads — teacher resource files can be big.
    client_max_body_size 120m;

    # Gzip static assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: every non-file route falls through to index.html so React Router takes over.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Don't cache index.html — the filename never changes but its contents do.
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # Hashed build artifacts can be cached aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API + admin + Django static + Django media all go to the backend.
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://backend;
    }

    location /media/ {
        proxy_pass http://backend;
    }
}
